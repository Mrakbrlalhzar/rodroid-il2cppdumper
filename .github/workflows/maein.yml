# .github/workflows/build-cli-armv7.yml
name: Build CLI for Android ARMv7

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26d

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: armv7-linux-androideabi
        override: true

    - name: Install Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
        unzip android-ndk-${NDK_VERSION}-linux.zip
        echo "ANDROID_NDK_HOME=${{ github.workspace }}/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
        echo "${{ github.workspace }}/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
        echo "SYSROOT=${{ github.workspace }}/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/sysroot" >> $GITHUB_ENV

    - name: Build for armv7 with proper linker flags
      run: |
        export ARMV7_LINUX_ANDROIDEABI_CC=armv7a-linux-androideabi21-clang
        export ARMV7_LINUX_ANDROIDEABI_AR=armv7a-linux-androideabi-ar
        export RUSTFLAGS="-C linker=armv7a-linux-androideabi21-clang -L $SYSROOT/usr/lib/arm-linux-androideabi"
        cd src-tauri
        cargo build --target armv7-linux-androideabi --release --verbose

    - name: Upload artifact (CLI)
      uses: actions/upload-artifact@v4
      with:
        name: il2cpp_dumper-cli-armv7
        path: src-tauri/target/armv7-linux-androideabi/release/il2cpp_dumper
