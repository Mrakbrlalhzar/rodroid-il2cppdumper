# .github/workflows/build-cli-armv7.yml
name: Build CLI for Android ARMv7

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26d

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: armv7-linux-androideabi
        override: true
        components: rust-src  # برای build-std در صورت نیاز

    - name: Install Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
        unzip android-ndk-${NDK_VERSION}-linux.zip
        echo "ANDROID_NDK_HOME=${{ github.workspace }}/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
        echo "${{ github.workspace }}/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build for armv7 using cargo-ndk
      run: |
        cd src-tauri
        cargo ndk --target armv7-linux-androideabi --platform 21 -- build --release

    - name: Upload artifact (CLI)
      uses: actions/upload-artifact@v4
      with:
        name: il2cpp_dumper-cli-armv7
        path: src-tauri/target/armv7-linux-androideabi/release/il2cpp_dumper
