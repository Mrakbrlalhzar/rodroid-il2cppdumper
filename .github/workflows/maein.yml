name: Build Android APK

on:
  workflow_dispatch:  # اجرای دستی

env:
  PROJECT_PATH: rodroid-il2cppdumper  # مسیر پروژه Tauri
  ANDROID_NDK_VERSION: 25.2.9519653
  JAVA_VERSION: 17

jobs:
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: '${{ env.PROJECT_PATH }}/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_PATH }}
        run: pnpm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install specific Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ndk.dir=${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}" > ${{ env.PROJECT_PATH }}/src-tauri/android/local.properties

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PROJECT_PATH }}/src-tauri

      - name: Install Tauri prerequisites (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Initialize Tauri Android project
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          pnpm tauri android init

      - name: Build Android APK (armv7)
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          pnpm tauri android build --target armv7-linux-androideabi --apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rodroid-armv7-android8-apk
          path: |
            ${{ env.PROJECT_PATH }}/src-tauri/android/app/build/outputs/apk/universal/debug/*.apk
            ${{ env.PROJECT_PATH }}/src-tauri/android/app/build/outputs/apk/armv7/debug/*.apk
